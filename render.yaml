services:
  - type: web
    name: smart-tracker-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run setup
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-app.vercel.app # Update this after Vercel deployment

databases:
  - name: smart-tracker-db
    plan: free
